<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>MapLibre GL JS + Rain effect</title>
<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
<link href="https://unpkg.com/maplibre-gl@5.23.0/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@5.23.0/dist/maplibre-gl.js"></script>
<style>
body { margin: 0; padding: 0; }
#map { position: absolute; top: 0; bottom: 0; width: 100%; }
#rain-canvas {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 10;
}
</style>
</head>
<body>
<div id="map"></div>
<canvas id="rain-canvas"></canvas>
<script>
const map = new maplibregl.Map({
  container: 'map',
  zoom: 16.8,
  center: [24.951528, 60.169573],
  pitch: 74,
  bearing: 12.8,
  hash: true,
  style: 'https://tiles.openfreemap.org/styles/bright'
});

// ── Rain particle system ──
const canvas = document.getElementById('rain-canvas');
const ctx = canvas.getContext('2d');
let drops = [];
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

function createDrops(count) {
  drops = [];
  for (let i = 0; i < count; i++) {
    drops.push({
      x: Math.random() * W,
      y: Math.random() * H,
      len: 10 + Math.random() * 20,
      speed: 8 + Math.random() * 12,
      opacity: 0.2 + Math.random() * 0.5,
      thickness: 1 + Math.random() * 2
    });
  }
}

function drawRain() {
  ctx.clearRect(0, 0, W, H);
  const angle = -0.15;
  const sinA = Math.sin(angle);
  const cosA = Math.cos(angle);

  for (const d of drops) {
    ctx.beginPath();
    ctx.moveTo(d.x, d.y);
    ctx.lineTo(d.x + d.len * sinA, d.y + d.len * cosA);
    ctx.strokeStyle = `rgba(168, 173, 188, ${d.opacity * 0.7})`;
    ctx.lineWidth = d.thickness;
    ctx.stroke();

    d.x += d.speed * sinA;
    d.y += d.speed * cosA;

    if (d.y > H + 20 || d.x < -20 || d.x > W + 20) {
      d.x = Math.random() * W * 1.2 - W * 0.1;
      d.y = -20;
    }
  }

  requestAnimationFrame(drawRain);
}

window.addEventListener('resize', () => { resize(); createDrops(180); });

resize();
createDrops(180);
drawRain();
</script>
</body>
</html>
