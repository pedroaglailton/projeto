<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Protótipo — Pin 3D estilo Google Maps</title>
<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
<link href="https://api.mapbox.com/mapbox-gl-js/v3.24.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.24.0/mapbox-gl.js"></script>
<style>
body { margin: 0; padding: 0; }
#map { position: absolute; top: 0; bottom: 0; width: 100%; }

.pino {
  position: relative;
  width: 0; height: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  cursor: pointer;
  filter: drop-shadow(0 2px 6px rgba(0,0,0,0.35));
}

/* Sombra no chão */
.pino .sombra {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 28px; height: 8px;
  border-radius: 50%;
  background: rgba(0,0,0,0.3);
  filter: blur(4px);
  z-index: 0;
}

/* Pin SVG (teardrop) */
.pino svg.pin-body {
  position: absolute;
  bottom: 2px;
  left: 50%;
  transform: translateX(-50%);
  width: 32px;
  height: 42px;
  z-index: 1;
  overflow: visible;
}

/* Bolinha numerada no centro do pin */
.pino .numero {
  position: absolute;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  width: 22px; height: 22px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 800;
  font-family: -apple-system, Segoe UI, sans-serif;
  color: #fff;
  z-index: 2;
  text-shadow: 0 1px 2px rgba(0,0,0,0.3);
  background: rgba(255,255,255,0.2);
  box-shadow: inset 0 1px 3px rgba(255,255,255,0.25);
}

/* Brilho na bolinha */
.pino .numero::after {
  content: '';
  position: absolute;
  top: 3px; left: 4px;
  width: 8px; height: 4px;
  border-radius: 50%;
  background: rgba(255,255,255,0.4);
  transform: rotate(-25deg);
}

/* Label abaixo */
.pino .label {
  position: absolute;
  bottom: -22px;
  left: 50%;
  transform: translateX(-50%);
  font-family: -apple-system, Segoe UI, monospace;
  font-size: 10px;
  font-weight: 600;
  color: rgba(255,255,255,0.8);
  background: rgba(0,0,0,0.45);
  padding: 1px 6px;
  border-radius: 4px;
  white-space: nowrap;
  backdrop-filter: blur(4px);
  z-index: 1;
}

/* Legenda */
#legenda {
  position: absolute;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(15, 23, 42, 0.85);
  backdrop-filter: blur(8px);
  padding: 12px 20px;
  border-radius: 12px;
  color: #e2e8f0;
  font-family: -apple-system, Segoe UI, sans-serif;
  font-size: 13px;
  display: flex;
  gap: 20px;
  align-items: center;
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  z-index: 100;
  pointer-events: none;
}
#legenda .item { display: flex; align-items: center; gap: 6px; }
#legenda .dot { width: 10px; height: 10px; border-radius: 50%; }
#legenda .hint { color: #94a3b8; font-size: 11px; }
</style>
</head>
<body>
<div id="map"></div>

<div id="legenda">
  <span style="font-weight:700;color:#fff;">📍 GOOGLE PIN</span>
  <span class="hint">▼ incline o mapa (Ctrl+arraste)</span>
  <div class="item"><span class="dot" style="background:#4285F4"></span> EQP-01</div>
  <div class="item"><span class="dot" style="background:#34A853"></span> EQP-02</div>
  <div class="item"><span class="dot" style="background:#9B59B6"></span> EQP-03</div>
  <div class="item"><span class="dot" style="background:#F97316"></span> EQP-04</div>
  <div class="item"><span class="dot" style="background:#E74C3C"></span> EQP-05</div>
</div>

<script>
mapboxgl.accessToken = 'pk.eyJ1IjoicGVkcm9hZ2xhaWx0b24iLCJhIjoiY21xMDQ2aDg3MDJrMjJ0cTBjd3dwYXJnOCJ9.4Ap4xEzCJ0US5mxDfmEf0g';

const map = new mapboxgl.Map({
  container: 'map',
  zoom: 14.2,
  center: [-38.5267, -3.7319],
  pitch: 65,
  bearing: 8,
  style: 'mapbox://styles/mapbox/standard'
});

const equipes = [
  { id: 'EQP-01', cor: '#4285F4', nome: 'Azul' },
  { id: 'EQP-02', cor: '#34A853', nome: 'Verde' },
  { id: 'EQP-03', cor: '#9B59B6', nome: 'Roxo' },
  { id: 'EQP-04', cor: '#F97316', nome: 'Laranja' },
  { id: 'EQP-05', cor: '#E74C3C', nome: 'Vermelho' },
];

// Posições variadas em Fortaleza
const posicoes = [
  [-38.5300, -3.7300],
  [-38.5220, -3.7350],
  [-38.5350, -3.7270],
  [-38.5180, -3.7380],
  [-38.5255, -3.7330],
];

function criarPino(eqp, idx) {
  const container = document.createElement('div');
  container.className = 'pino';

  // Sombra
  const sombra = document.createElement('div');
  sombra.className = 'sombra';
  container.appendChild(sombra);

  // Pin SVG — teardrop igual Google Maps
  const pinSvg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  pinSvg.setAttribute('class', 'pin-body');
  pinSvg.setAttribute('viewBox', '0 0 32 42');
  pinSvg.innerHTML = `
    <defs>
      <linearGradient id="grad-${idx}" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="${eqp.cor}" stop-opacity="1"/>
        <stop offset="85%" stop-color="${eqp.cor}" stop-opacity="1"/>
        <stop offset="100%" stop-color="${eqp.cor}" stop-opacity="0.5"/>
      </linearGradient>
      <filter id="shadow-${idx}">
        <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-opacity="0.25"/>
      </filter>
    </defs>
    <path d="M16 2C10 2 5 7 5 13c0 8 11 26 11 26s11-18 11-26c0-6-5-11-11-11z"
          fill="url(#grad-${idx})"
          filter="url(#shadow-${idx})"
          stroke="${eqp.cor}" stroke-width="0.5"/>
    <path d="M16 6c-3.5 0-6 2.8-6 6.3 0 4 6 12 6 12s6-8 6-12c0-3.5-2.5-6.3-6-6.3z"
          fill="rgba(255,255,255,0.2)" opacity="0.4"/>
  `;
  container.appendChild(pinSvg);

  // Número
  const numero = document.createElement('div');
  numero.className = 'numero';
  numero.textContent = eqp.id.replace('EQP-', '');
  container.appendChild(numero);

  // Label
  const label = document.createElement('div');
  label.className = 'label';
  label.textContent = eqp.id;
  container.appendChild(label);

  return container;
}

map.on('load', () => {
  map.setConfigProperty('basemap', 'lightPreset', 'day');

  equipes.forEach((eqp, i) => {
    const el = criarPino(eqp, i);
    new mapboxgl.Marker({ element: el, anchor: 'bottom' })
      .setLngLat(posicoes[i])
      .setPopup(new mapboxgl.Popup({ offset: 55 }).setHTML(`
        <div style="font-family:system-ui;min-width:150px;">
          <div style="display:flex;align-items:center;gap:8px;">
            <span style="width:12px;height:12px;border-radius:50%;background:${eqp.cor};display:inline-block;"></span>
            <strong style="font-size:16px;">${eqp.id}</strong>
          </div>
          <span style="color:#6b7280;font-size:12px;">${posicoes[i][1].toFixed(4)}, ${posicoes[i][0].toFixed(4)}</span><br>
          <span style="display:inline-block;margin-top:6px;padding:2px 10px;border-radius:6px;background:#22c55e;color:#fff;font-size:11px;">● Online</span>
        </div>
      `))
      .addTo(map);
  });
});
</script>
</body>
</html>
