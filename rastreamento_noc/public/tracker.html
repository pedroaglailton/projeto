<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tracker Equipe</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 14px; background: #f1f5f9; }
    .card { max-width: 560px; margin: 0 auto; background: #fff; border: 1px solid #cbd5e1; border-radius: 12px; padding: 14px; }
    label { font-size: 12px; font-weight: 700; display: block; margin: 8px 0 5px; }
    input, button { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #94a3b8; }
    button { border: none; background: #0057b8; color: #fff; font-weight: 700; margin-top: 10px; }
    #log { margin-top: 10px; font-size: 12px; color: #334155; }
  </style>
</head>
<body>
  <div class="card">
    <h3 style="margin:0 0 8px;">Envio de Localizacao (Equipe)</h3>
    <label>Equipe ID</label>
    <input id="equipeId" placeholder="ex: CAMINHAO-01">
    <label>Nome da Equipe</label>
    <input id="equipeNome" placeholder="ex: Equipe Sobral 1">
    <button id="btnStart">Iniciar Rastreamento</button>
    <button id="btnStop" style="background:#b91c1c">Parar Rastreamento</button>
    <div id="log">Parado</div>
  </div>

  <script>
    let watchId = null;
    const log = (m) => document.getElementById('log').textContent = m;

    async function enviarPosicao(pos) {
      const equipeId = document.getElementById('equipeId').value.trim();
      const equipeNome = document.getElementById('equipeNome').value.trim();
      if (!equipeId) return log('Informe Equipe ID');

      const payload = {
        equipeId,
        equipeNome,
        lat: pos.coords.latitude,
        lng: pos.coords.longitude,
        speed: pos.coords.speed,
        heading: pos.coords.heading,
        accuracy: pos.coords.accuracy,
        ts: Date.now()
      };

      await fetch('/api/posicao', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      log(`Enviado: ${payload.lat.toFixed(6)}, ${payload.lng.toFixed(6)} (${Math.round(payload.accuracy)}m)`);
    }

    document.getElementById('btnStart').onclick = () => {
      if (!navigator.geolocation) return log('GPS nao suportado');
      if (watchId != null) navigator.geolocation.clearWatch(watchId);
      watchId = navigator.geolocation.watchPosition(
        enviarPosicao,
        () => log('Erro no GPS'),
        { enableHighAccuracy: true, timeout: 20000, maximumAge: 5000 }
      );
      log('Rastreamento iniciado');
    };

    document.getElementById('btnStop').onclick = () => {
      if (watchId != null) navigator.geolocation.clearWatch(watchId);
      watchId = null;
      log('Rastreamento parado');
    };
  </script>
</body>
</html>
