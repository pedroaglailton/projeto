<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Teste: Câmeras 3D</title>
  <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.24.0/mapbox-gl.css" rel="stylesheet">
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.24.0/mapbox-gl.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif; background: #0f172a; color: #e2e8f0; }
    #map { width: 100%; height: 100vh; }
    #info {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: #1e293be0; backdrop-filter: blur(6px);
      border: 1px solid #334155; border-radius: 10px;
      padding: 10px 18px; font-size: 13px; z-index: 999;
      text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,.5);
      pointer-events: none;
    }
    #legend {
      position: fixed; top: 16px; right: 60px; z-index: 999;
      background: #1e293be0; backdrop-filter: blur(6px);
      border: 1px solid #334155; border-radius: 8px;
      padding: 10px 14px; font-size: 12px; color: #94a3b8;
    }
    #legend span { display: flex; align-items: center; gap: 6px; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="legend">
    <span>📷 <b id="contador">0</b> câmeras</span>
    <span style="font-size:10px;color:#64748b">zoom 13+ ícone · 18+ 3D</span>
  </div>
  <div id="info">🔍 Dê zoom em Fortaleza para ver as câmeras</div>

  <script>
    mapboxgl.accessToken = 'pk.eyJ1IjoicGVkcm9hZ2xhaWx0b24iLCJhIjoiY21xMDQ2aDg3MDJrMjJ0cTBjd3dwYXJnOCJ9.4Ap4xEzCJ0US5mxDfmEf0g';

    const map = new mapboxgl.Map({
      container: 'map',
      zoom: 11,
      center: [-38.5267, -3.7319],
      pitch: 0,
      style: 'mapbox://styles/mapbox/standard'
    });
    map.addControl(new mapboxgl.NavigationControl(), 'top-right');

    // Ajusta pitch conforme zoom (fica 3D ao aproximar)
    map.on('zoom', () => {
      const z = map.getZoom();
      const pitch = Math.max(0, Math.min(60, (z - 10) * 10));
      map.easeTo({ pitch, duration: 200 });
    });

    function desenharPoste3D(ctx, w, h) {
      // sombra do poste no chão
      ctx.fillStyle = 'rgba(0,0,0,0.25)';
      ctx.beginPath();
      ctx.ellipse(w * 0.48, h * 0.88, w * 0.25, w * 0.08, 0, 0, Math.PI * 2);
      ctx.fill();

      // poste (com gradiente lateral para efeito 3D)
      const gradPoste = ctx.createLinearGradient(0, 0, w * 0.45, 0);
      gradPoste.addColorStop(0, '#475569');
      gradPoste.addColorStop(0.3, '#94a3b8');
      gradPoste.addColorStop(0.7, '#cbd5e1');
      gradPoste.addColorStop(1, '#334155');
      ctx.fillStyle = gradPoste;
      ctx.fillRect(w * 0.38, h * 0.30, w * 0.14, h * 0.60);

      // suporte braço
      const gradBraco = ctx.createLinearGradient(0, 0, w * 0.50, 0);
      gradBraco.addColorStop(0, '#64748b');
      gradBraco.addColorStop(0.5, '#94a3b8');
      gradBraco.addColorStop(1, '#475569');
      ctx.fillStyle = gradBraco;
      ctx.fillRect(w * 0.25, h * 0.28, w * 0.50, h * 0.06);

      // corpo da camera (caixa 3D)
      const cx = w * 0.22, cy = h * 0.12, cw = w * 0.56, ch = h * 0.20;
      // face frontal
      const gradCam = ctx.createLinearGradient(cx, cy, cx + cw, cy);
      gradCam.addColorStop(0, '#0ea5e9');
      gradCam.addColorStop(0.3, '#38bdf8');
      gradCam.addColorStop(0.7, '#7dd3fc');
      gradCam.addColorStop(1, '#0284c7');
      ctx.fillStyle = gradCam;
      ctx.fillRect(cx, cy, cw, ch);
      ctx.strokeStyle = '#0c4a6e';
      ctx.lineWidth = 1.5;
      ctx.strokeRect(cx, cy, cw, ch);

      // topo da camera (face superior - perspectiva)
      ctx.fillStyle = '#0284c7';
      ctx.beginPath();
      ctx.moveTo(cx + cw * 0.1, cy);
      ctx.lineTo(cx + cw * 0.9, cy);
      ctx.lineTo(cx + cw, cy - ch * 0.25);
      ctx.lineTo(cx + cw * 0.2, cy - ch * 0.25);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#0c4a6e';
      ctx.lineWidth = 1;
      ctx.stroke();

      // lateral direita da camera
      ctx.fillStyle = '#0369a1';
      ctx.beginPath();
      ctx.moveTo(cx + cw, cy);
      ctx.lineTo(cx + cw, cy + ch);
      ctx.lineTo(cx + cw * 1.1, cy + ch * 0.75);
      ctx.lineTo(cx + cw * 1.1, cy - ch * 0.25);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#0c4a6e';
      ctx.lineWidth = 1;
      ctx.stroke();

      // lente (círculo com brilho)
      const lx = cx + cw * 0.42, ly = cy + ch * 0.5, lr = ch * 0.32;
      const gradLente = ctx.createRadialGradient(lx - lr * 0.2, ly - lr * 0.2, lr * 0.05, lx, ly, lr);
      gradLente.addColorStop(0, '#ffffff');
      gradLente.addColorStop(0.3, '#7dd3fc');
      gradLente.addColorStop(0.7, '#0369a1');
      gradLente.addColorStop(1, '#0c4a6e');
      ctx.fillStyle = gradLente;
      ctx.beginPath();
      ctx.arc(lx, ly, lr, 0, Math.PI * 2);
      ctx.fill();

      // brilho da lente
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.beginPath();
      ctx.arc(lx - lr * 0.2, ly - lr * 0.25, lr * 0.25, 0, Math.PI * 2);
      ctx.fill();

      // LED vermelho
      ctx.fillStyle = '#ef4444';
      ctx.shadowColor = '#ef4444';
      ctx.shadowBlur = 3;
      ctx.beginPath();
      ctx.arc(cx + cw * 0.85, cy + ch * 0.25, ch * 0.08, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    map.on('load', async () => {
      try {
        // ── 1. Cria ícone 2D com aspecto 3D ──
        const canvas = document.createElement('canvas');
        const size = 128;
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');
        desenharPoste3D(ctx, size, size);

        const img = new Image();
        await new Promise((resolve, reject) => {
          img.onload = resolve;
          img.onerror = reject;
          canvas.toBlob(blob => { img.src = URL.createObjectURL(blob); });
        });
        map.addImage('camera-icon', img, { pixelRatio: 2 });

        // ── 2. Carrega os pontos ──
        const resp = await fetch('/pontos_planejados.json');
        const data = await resp.json();
        const pontos = Array.isArray(data.pontos) ? data.pontos : [];

        const features = pontos.map(p => ({
          type: 'Feature',
          geometry: { type: 'Point', coordinates: [p.lng, p.lat] },
          properties: {
            id: p.id,
            nome: p.nome || ('Ponto ' + p.id),
            cidade: p.cidade || ''
          }
        }));

        map.addSource('cameras', {
          type: 'geojson',
          data: { type: 'FeatureCollection', features },
          cluster: false,
          maxzoom: 22
        });

        // ── 3. Círculos (zoom baixo) ──
        map.addLayer({
          id: 'cameras-circle',
          type: 'circle',
          source: 'cameras',
          minzoom: 10,
          maxzoom: 13.9,
          paint: {
            'circle-radius': ['interpolate', ['linear'], ['zoom'], 10, 2, 13, 6],
            'circle-color': '#38bdf8',
            'circle-opacity': ['interpolate', ['linear'], ['zoom'], 10, 0, 11, 0.6, 13, 1],
            'circle-stroke-width': 1,
            'circle-stroke-color': '#0284c7'
          }
        });

        // ── 4. Ícone 2D (zoom médio-alto) ──
        map.addLayer({
          id: 'cameras-icon',
          type: 'symbol',
          source: 'cameras',
          minzoom: 13,
          layout: {
            'icon-image': 'camera-icon',
            'icon-size': ['interpolate', ['linear'], ['zoom'],
              13, 0.15,
              14, 0.25,
              16, 0.5,
              18, 1.0,
              20, 2.0,
              22, 4.0
            ],
            'icon-anchor': 'bottom',
            'icon-allow-overlap': true,
            'icon-ignore-placement': true
          }
        });

        // ── 5. Labels ──
        map.addLayer({
          id: 'cameras-label',
          type: 'symbol',
          source: 'cameras',
          minzoom: 15,
          layout: {
            'text-field': ['get', 'nome'],
            'text-size': ['interpolate', ['linear'], ['zoom'], 15, 8, 18, 12, 22, 18],
            'text-offset': [0, -1.8],
            'text-font': ['DIN Pro Medium', 'Arial Unicode MS Bold'],
            'text-optional': true
          },
          paint: {
            'text-color': '#e2e8f0',
            'text-halo-color': 'rgba(0,0,0,0.8)',
            'text-halo-width': 2
          }
        });

        // ── 6. Popups ──
        map.on('click', 'cameras-icon', (e) => {
          const p = e.features[0].properties;
          new mapboxgl.Popup()
            .setLngLat(e.lngLat)
            .setHTML(`<b>${p.nome}</b><br>${p.cidade}<br><span style="font-size:11px;color:#94a3b8">${e.lngLat.lat.toFixed(5)}, ${e.lngLat.lng.toFixed(5)}</span>`)
            .addTo(map);
        });
        map.on('click', 'cameras-circle', (e) => {
          const p = e.features[0].properties;
          new mapboxgl.Popup()
            .setLngLat(e.lngLat)
            .setHTML(`<b>${p.nome}</b><br>${p.cidade}`)
            .addTo(map);
        });
        map.on('mouseenter', 'cameras-icon', () => map.getCanvas().style.cursor = 'pointer');
        map.on('mouseleave', 'cameras-icon', () => map.getCanvas().style.cursor = '');
        map.on('mouseenter', 'cameras-circle', () => map.getCanvas().style.cursor = 'pointer');
        map.on('mouseleave', 'cameras-circle', () => map.getCanvas().style.cursor = '');

        const pontosCount = features.length;
        document.getElementById('contador').textContent = pontosCount;
        document.getElementById('info').textContent = `✅ ${pontosCount} câmeras carregadas`;
      } catch (err) {
        document.getElementById('info').textContent = `❌ Erro: ${err.message}`;
        console.error('teste-camera-layer:', err);
      }
    });
  </script>
</body>
</html>
