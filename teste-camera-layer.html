<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Teste: Câmeras 3D</title>
  <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.24.0/mapbox-gl.css" rel="stylesheet">
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.24.0/mapbox-gl.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif; background: #0f172a; color: #e2e8f0; }
    #map { width: 100%; height: 100vh; }
    #info {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: #1e293be0; backdrop-filter: blur(6px);
      border: 1px solid #334155; border-radius: 10px;
      padding: 10px 18px; font-size: 13px; z-index: 999;
      text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,.5);
      pointer-events: none;
    }
    #legend {
      position: fixed; top: 16px; right: 60px; z-index: 999;
      background: #1e293be0; backdrop-filter: blur(6px);
      border: 1px solid #334155; border-radius: 8px;
      padding: 10px 14px; font-size: 12px; color: #94a3b8;
    }
    #legend span { display: flex; align-items: center; gap: 6px; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="legend">
    <span>📷 <b id="contador">0</b> câmeras</span>
    <span style="font-size:10px;color:#64748b">zoom 13+ ícone · 18+ 3D</span>
  </div>
  <div id="info">🔍 Dê zoom em Fortaleza para ver as câmeras</div>

  <script>
    mapboxgl.accessToken = 'pk.eyJ1IjoicGVkcm9hZ2xhaWx0b24iLCJhIjoiY21xMDQ2aDg3MDJrMjJ0cTBjd3dwYXJnOCJ9.4Ap4xEzCJ0US5mxDfmEf0g';

    const map = new mapboxgl.Map({
      container: 'map',
      zoom: 11,
      center: [-38.5267, -3.7319],
      pitch: 0,
      style: 'mapbox://styles/mapbox/standard'
    });
    map.addControl(new mapboxgl.NavigationControl(), 'top-right');

    // Ajusta pitch conforme zoom (fica 3D ao aproximar)
    map.on('zoomend', () => {
      const z = map.getZoom();
      const pitch = Math.max(0, Math.min(60, (z - 10) * 10));
      map.setPitch(pitch);
    });

    function desenharPosteRealista(ctx, w, h) {
      // ── Poste cônico FINO ──
      const baseL = w * 0.08;
      const topoL = w * 0.04;
      const posteY = h - h * 0.04;
      const posteTopo = h * 0.30;
      const posteH = posteY - posteTopo;

      const gradMetal = ctx.createLinearGradient(w * 0.3, 0, w * 0.7, 0);
      gradMetal.addColorStop(0, '#64748b');
      gradMetal.addColorStop(0.3, '#cbd5e1');
      gradMetal.addColorStop(0.5, '#f1f5f9');
      gradMetal.addColorStop(0.7, '#94a3b8');
      gradMetal.addColorStop(1, '#475569');
      ctx.fillStyle = gradMetal;
      ctx.beginPath();
      ctx.moveTo(w * 0.5 - baseL / 2, posteY);
      ctx.lineTo(w * 0.5 - topoL / 2, posteTopo);
      ctx.lineTo(w * 0.5 + topoL / 2, posteTopo);
      ctx.lineTo(w * 0.5 + baseL / 2, posteY);
      ctx.closePath();
      ctx.fill();

      // sombra poste
      ctx.fillStyle = 'rgba(0,0,0,0.06)';
      ctx.fillRect(w * 0.5 - baseL / 2 - 2, posteY - posteH * 0.3, 3, posteH * 0.3);

      // base flange
      ctx.fillStyle = '#475569';
      ctx.fillRect(w * 0.5 - baseL / 2 - 2, posteY - 2, baseL + 4, 4);
      ctx.fillStyle = '#334155';
      ctx.fillRect(w * 0.5 - baseL / 2 - 1, posteY, baseL + 2, 2);

      // ── Caixa hermética 3D ──
      const cxY = posteY - posteH * 0.32;
      const cxW = baseL * 1.8;
      const cH = posteH * 0.09;
      const cxX = w * 0.5 - cxW / 2;

      const gf = ctx.createLinearGradient(cxX, 0, cxX + cxW, 0);
      gf.addColorStop(0, '#334155'); gf.addColorStop(0.3, '#94a3b8');
      gf.addColorStop(0.7, '#cbd5e1'); gf.addColorStop(1, '#475569');
      ctx.fillStyle = gf;
      ctx.fillRect(cxX, cxY - cH / 2, cxW, cH);

      ctx.fillStyle = '#64748b';
      ctx.beginPath();
      ctx.moveTo(cxX, cxY - cH / 2);
      ctx.lineTo(cxX + 3, cxY - cH / 2 - 4);
      ctx.lineTo(cxX + cxW + 3, cxY - cH / 2 - 4);
      ctx.lineTo(cxX + cxW, cxY - cH / 2);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = '#1e293b';
      ctx.beginPath();
      ctx.moveTo(cxX + cxW, cxY - cH / 2);
      ctx.lineTo(cxX + cxW + 3, cxY - cH / 2 - 4);
      ctx.lineTo(cxX + cxW + 3, cxY + cH / 2 - 4);
      ctx.lineTo(cxX + cxW, cxY + cH / 2);
      ctx.closePath();
      ctx.fill();

      ctx.strokeStyle = '#1e293b';
      ctx.lineWidth = 0.6;
      ctx.strokeRect(cxX, cxY - cH / 2, cxW, cH);
      ctx.beginPath();
      ctx.moveTo(cxX + 3, cxY);
      ctx.lineTo(cxX + cxW - 3, cxY);
      ctx.stroke();

      ctx.fillStyle = '#1e293b';
      [[cxX + 5, cxY], [cxX + cxW - 5, cxY]].forEach(([x, y]) => {
        ctx.beginPath(); ctx.arc(x, y, 1.2, 0, Math.PI * 2); ctx.fill();
      });

      // ── Suporte/bracket da PTZ ──
      const bracoY = posteTopo + 2;
      ctx.strokeStyle = '#64748b';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(w * 0.5, bracoY);
      ctx.lineTo(w * 0.5 + w * 0.18, bracoY - 4);
      ctx.stroke();

      ctx.strokeStyle = '#475569';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(w * 0.5 + w * 0.18, bracoY - 4);
      ctx.lineTo(w * 0.5 + w * 0.18, bracoY + h * 0.015);
      ctx.stroke();

      // ── PTZ Hikvision Speed Dome ──
      const cxPtz = w * 0.5 + w * 0.18;
      const cyPtz = bracoY + h * 0.015;

      // corpo principal (formato arredondado, branco)
      const cW = w * 0.16;
      const cH2 = h * 0.055;
      const cX = cxPtz - cW / 2;
      const cY = cyPtz;

      ctx.fillStyle = '#f1f5f9';
      ctx.beginPath();
      ctx.roundRect(cX, cY, cW, cH2, 3);
      ctx.fill();
      ctx.strokeStyle = '#94a3b8';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.roundRect(cX, cY, cW, cH2, 3);
      ctx.stroke();

      // detalhe Hikvision (faixa cinza)
      ctx.fillStyle = '#e2e8f0';
      ctx.fillRect(cX + 3, cY + cH2 * 0.3, cW * 0.2, cH2 * 0.4);

      // fendas
      ctx.strokeStyle = '#cbd5e1';
      ctx.lineWidth = 0.4;
      for (let i = 0; i < 2; i++) {
        const vy = cY + cH2 * 0.25 + i * 3;
        ctx.beginPath();
        ctx.moveTo(cX + cW * 0.5, vy);
        ctx.lineTo(cX + cW * 0.65, vy);
        ctx.stroke();
      }

      // sunshield (visor preto na frente)
      ctx.fillStyle = '#1e293b';
      ctx.beginPath();
      ctx.moveTo(cX - 2, cY + 2);
      ctx.lineTo(cX + cW + 2, cY + 2);
      ctx.lineTo(cX + cW + 4, cY - 3);
      ctx.lineTo(cX - 1, cY - 4);
      ctx.closePath();
      ctx.fill();

      // anel do domo
      ctx.fillStyle = '#64748b';
      ctx.fillRect(cX - 1, cY + cH2 - 2, cW + 2, 4);

      // IR LEDs no anel
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      for (let i = 0; i < 4; i++) {
        const lx = cX + 2 + i * (cW - 4) / 3;
        ctx.beginPath(); ctx.arc(lx, cY + cH2, 0.8, 0, Math.PI * 2); ctx.fill();
      }

      // ── Domo (cúpula) ──
      const dX = cxPtz;
      const dY = cY + cH2 + 1;
      const dR = w * 0.09;

      const gd = ctx.createRadialGradient(dX - dR * 0.25, dY - dR * 0.1, 1, dX, dY + 2, dR);
      gd.addColorStop(0, 'rgba(255,255,255,0.15)');
      gd.addColorStop(0.15, 'rgba(180,200,230,0.08)');
      gd.addColorStop(0.45, 'rgba(25,45,75,0.5)');
      gd.addColorStop(0.8, 'rgba(8,15,30,0.85)');
      gd.addColorStop(1, 'rgba(3,6,12,0.95)');

      ctx.fillStyle = gd;
      ctx.beginPath();
      ctx.ellipse(dX, dY, dR, dR * 0.6, 0, Math.PI, 0);
      ctx.fill();

      ctx.strokeStyle = 'rgba(100,120,140,0.25)';
      ctx.lineWidth = 0.4;
      ctx.beginPath();
      ctx.ellipse(dX, dY, dR, dR * 0.6, 0, Math.PI, 0);
      ctx.stroke();

      // reflexo
      ctx.fillStyle = 'rgba(255,255,255,0.08)';
      ctx.beginPath();
      ctx.ellipse(dX - dR * 0.25, dY - dR * 0.05, dR * 0.18, dR * 0.25, -0.3, 0, Math.PI * 2);
      ctx.fill();

      // lente visível
      ctx.fillStyle = 'rgba(0,0,0,0.4)';
      ctx.beginPath();
      ctx.arc(dX, dY + 2, dR * 0.2, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = 'rgba(100,150,255,0.05)';
      ctx.beginPath();
      ctx.arc(dX - 1, dY + 1, dR * 0.1, 0, Math.PI * 2);
      ctx.fill();
    }

    map.on('load', async () => {
      try {
        // ── 1. Cria ícone 2D com aspecto 3D ──
        const canvas = document.createElement('canvas');
        const size = 128;
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');
        desenharPosteRealista(ctx, size, size);

        const img = new Image();
        await new Promise((resolve, reject) => {
          img.onload = resolve;
          img.onerror = reject;
          canvas.toBlob(blob => { img.src = URL.createObjectURL(blob); });
        });
        map.addImage('camera-icon', img, { pixelRatio: 2 });

        // ── 2. Carrega os pontos ──
        const resp = await fetch('/pontos_planejados.json');
        const data = await resp.json();
        const pontos = Array.isArray(data.pontos) ? data.pontos : [];

        const features = pontos.map(p => ({
          type: 'Feature',
          geometry: { type: 'Point', coordinates: [p.lng, p.lat] },
          properties: {
            id: p.id,
            nome: p.nome || ('Ponto ' + p.id),
            cidade: p.cidade || ''
          }
        }));

        map.addSource('cameras', {
          type: 'geojson',
          data: { type: 'FeatureCollection', features },
          cluster: false,
          maxzoom: 22
        });

        // ── 3. Círculos (zoom baixo) ──
        map.addLayer({
          id: 'cameras-circle',
          type: 'circle',
          source: 'cameras',
          minzoom: 10,
          maxzoom: 13.9,
          paint: {
            'circle-radius': ['interpolate', ['linear'], ['zoom'], 10, 2, 13, 6],
            'circle-color': '#38bdf8',
            'circle-opacity': ['interpolate', ['linear'], ['zoom'], 10, 0, 11, 0.6, 13, 1],
            'circle-stroke-width': 1,
            'circle-stroke-color': '#0284c7'
          }
        });

        // ── 4. Ícone 2D (zoom médio-alto) ──
        map.addLayer({
          id: 'cameras-icon',
          type: 'symbol',
          source: 'cameras',
          minzoom: 13,
          layout: {
            'icon-image': 'camera-icon',
            'icon-size': ['interpolate', ['linear'], ['zoom'],
              13, 0.15,
              14, 0.25,
              16, 0.5,
              18, 1.0,
              20, 2.0,
              22, 4.0
            ],
            'icon-anchor': 'bottom',
            'icon-allow-overlap': true,
            'icon-ignore-placement': true
          }
        });

        // ── 5. Labels ──
        map.addLayer({
          id: 'cameras-label',
          type: 'symbol',
          source: 'cameras',
          minzoom: 15,
          layout: {
            'text-field': ['get', 'nome'],
            'text-size': ['interpolate', ['linear'], ['zoom'], 15, 8, 18, 12, 22, 18],
            'text-offset': [0, -1.8],
            'text-font': ['DIN Pro Medium', 'Arial Unicode MS Bold'],
            'text-optional': true
          },
          paint: {
            'text-color': '#e2e8f0',
            'text-halo-color': 'rgba(0,0,0,0.8)',
            'text-halo-width': 2
          }
        });

        // ── 6. Popups ──
        map.on('click', 'cameras-icon', (e) => {
          const p = e.features[0].properties;
          new mapboxgl.Popup()
            .setLngLat(e.lngLat)
            .setHTML(`<b>${p.nome}</b><br>${p.cidade}<br><span style="font-size:11px;color:#94a3b8">${e.lngLat.lat.toFixed(5)}, ${e.lngLat.lng.toFixed(5)}</span>`)
            .addTo(map);
        });
        map.on('click', 'cameras-circle', (e) => {
          const p = e.features[0].properties;
          new mapboxgl.Popup()
            .setLngLat(e.lngLat)
            .setHTML(`<b>${p.nome}</b><br>${p.cidade}`)
            .addTo(map);
        });
        map.on('mouseenter', 'cameras-icon', () => map.getCanvas().style.cursor = 'pointer');
        map.on('mouseleave', 'cameras-icon', () => map.getCanvas().style.cursor = '');
        map.on('mouseenter', 'cameras-circle', () => map.getCanvas().style.cursor = 'pointer');
        map.on('mouseleave', 'cameras-circle', () => map.getCanvas().style.cursor = '');

        const pontosCount = features.length;
        document.getElementById('contador').textContent = pontosCount;
        document.getElementById('info').textContent = `✅ ${pontosCount} câmeras carregadas`;
      } catch (err) {
        document.getElementById('info').textContent = `❌ Erro: ${err.message}`;
        console.error('teste-camera-layer:', err);
      }
    });
  </script>
</body>
</html>
