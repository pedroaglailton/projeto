<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Teste: Câmeras 3D</title>
  <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.24.0/mapbox-gl.css" rel="stylesheet">
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.24.0/mapbox-gl.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif; background: #0f172a; color: #e2e8f0; }
    #map { width: 100%; height: 100vh; }
    #info {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: #1e293be0; backdrop-filter: blur(6px);
      border: 1px solid #334155; border-radius: 10px;
      padding: 10px 18px; font-size: 13px; z-index: 999;
      text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,.5);
      pointer-events: none;
    }
    #legend {
      position: fixed; top: 16px; right: 60px; z-index: 999;
      background: #1e293be0; backdrop-filter: blur(6px);
      border: 1px solid #334155; border-radius: 8px;
      padding: 10px 14px; font-size: 12px; color: #94a3b8;
    }
    #legend span { display: flex; align-items: center; gap: 6px; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="legend">
    <span>📷 <b id="contador">0</b> câmeras</span>
    <span style="font-size:10px;color:#64748b">zoom 13+ ícone · 18+ 3D</span>
  </div>
  <div id="info">🔍 Dê zoom em Fortaleza para ver as câmeras</div>

  <script>
    mapboxgl.accessToken = 'pk.eyJ1IjoicGVkcm9hZ2xhaWx0b24iLCJhIjoiY21xMDQ2aDg3MDJrMjJ0cTBjd3dwYXJnOCJ9.4Ap4xEzCJ0US5mxDfmEf0g';

    const map = new mapboxgl.Map({
      container: 'map',
      zoom: 11,
      center: [-38.5267, -3.7319],
      pitch: 0,
      style: 'mapbox://styles/mapbox/standard'
    });
    map.addControl(new mapboxgl.NavigationControl(), 'top-right');

    // Ajusta pitch conforme zoom (fica 3D ao aproximar)
    map.on('zoomend', () => {
      const z = map.getZoom();
      const pitch = Math.max(0, Math.min(60, (z - 10) * 10));
      map.setPitch(pitch);
    });

    function desenharPosteRealista(ctx, w, h) {
      // ── Poste cônico de 15m ──
      const baseL = w * 0.20;    // largura na base (~26px)
      const topoL = w * 0.08;    // largura no topo (~10px)
      const posteY = h - h * 0.04;
      const posteTopo = h * 0.22;
      const posteH = posteY - posteTopo;

      // gradiente metálico do poste
      const gradMetal = ctx.createLinearGradient(w * 0.3, 0, w * 0.7, 0);
      gradMetal.addColorStop(0, '#64748b');
      gradMetal.addColorStop(0.25, '#cbd5e1');
      gradMetal.addColorStop(0.5, '#f1f5f9');
      gradMetal.addColorStop(0.75, '#94a3b8');
      gradMetal.addColorStop(1, '#475569');

      // poste cônico
      ctx.fillStyle = gradMetal;
      ctx.beginPath();
      ctx.moveTo(w * 0.5 - baseL / 2, posteY);
      ctx.lineTo(w * 0.5 - topoL / 2, posteTopo);
      ctx.lineTo(w * 0.5 + topoL / 2, posteTopo);
      ctx.lineTo(w * 0.5 + baseL / 2, posteY);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#334155';
      ctx.lineWidth = 0.5;
      ctx.stroke();

      // ── Base flange ──
      ctx.fillStyle = '#475569';
      ctx.fillRect(w * 0.5 - baseL / 2 - 4, posteY - 3, baseL + 8, 6);
      ctx.fillStyle = '#334155';
      ctx.fillRect(w * 0.5 - baseL / 2 - 2, posteY, baseL + 4, 2);
      ctx.fillStyle = '#1e293b';
      const parafusos = [
        [w * 0.5 - baseL / 2 - 2, posteY],
        [w * 0.5 + baseL / 2 + 2, posteY]
      ];
      parafusos.forEach(([x, y]) => { ctx.beginPath(); ctx.arc(x, y, 2, 0, Math.PI * 2); ctx.fill(); });

      // ── Caixa hermética (meio do poste) ──
      const cxH = posteH * 0.28;
      const cxY = posteY - posteH * 0.30;
      const cxW = baseL * 0.85;
      const cH = posteH * 0.12;

      // corpo da caixa
      const gradCaixa = ctx.createLinearGradient(w * 0.5 - cxW / 2, 0, w * 0.5 + cxW / 2, 0);
      gradCaixa.addColorStop(0, '#334155');
      gradCaixa.addColorStop(0.3, '#94a3b8');
      gradCaixa.addColorStop(0.7, '#cbd5e1');
      gradCaixa.addColorStop(1, '#475569');
      ctx.fillStyle = gradCaixa;
      ctx.fillRect(w * 0.5 - cxW / 2, cxY - cH / 2, cxW, cH);
      ctx.strokeStyle = '#1e293b';
      ctx.lineWidth = 1;
      ctx.strokeRect(w * 0.5 - cxW / 2, cxY - cH / 2, cxW, cH);

      // tampa / linha divisória da caixa
      ctx.strokeStyle = '#1e293b';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(w * 0.5 - cxW / 2 + 4, cxY);
      ctx.lineTo(w * 0.5 + cxW / 2 - 4, cxY);
      ctx.stroke();

      // fechos da caixa
      ctx.fillStyle = '#1e293b';
      [[w * 0.5 - cxW / 2 + 6, cxY], [w * 0.5 + cxW / 2 - 6, cxY]].forEach(([x, y]) => {
        ctx.beginPath();
        ctx.arc(x, y, 2, 0, Math.PI * 2);
        ctx.fill();
      });

      // ── Braço articulado para PTZ ──
      const bracoY = posteTopo + 2;
      ctx.strokeStyle = '#64748b';
      ctx.lineWidth = 3.5;
      ctx.beginPath();
      ctx.moveTo(w * 0.5, bracoY);
      ctx.lineTo(w * 0.5 + w * 0.22, bracoY - 4);
      ctx.stroke();

      // suporte vertical do braço
      ctx.strokeStyle = '#475569';
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(w * 0.5 + w * 0.22, bracoY - 4);
      ctx.lineTo(w * 0.5 + w * 0.22, bracoY + h * 0.04);
      ctx.stroke();

      // ── PTZ (câmera domo) ──
      const ptzX = w * 0.5 + w * 0.22;
      const ptzY = bracoY + h * 0.04;
      const ptzW = w * 0.20;
      const ptzH = h * 0.14;

      // base da PTZ (anel)
      ctx.fillStyle = '#64748b';
      ctx.fillRect(ptzX - ptzW / 2 - 1, ptzY - 3, ptzW + 2, 6);
      ctx.fillStyle = '#475569';
      ctx.fillRect(ptzX - ptzW / 2 - 2, ptzY - 1, ptzW + 4, 3);

      // domo (cúpula) - gradiente esférico
      const gradDomo = ctx.createRadialGradient(
        ptzX - ptzW * 0.15, ptzY + ptzH * 0.15, ptzH * 0.05,
        ptzX, ptzY + ptzH * 0.3, ptzH * 0.65
      );
      gradDomo.addColorStop(0, 'rgba(255,255,255,0.9)');
      gradDomo.addColorStop(0.15, 'rgba(200,220,240,0.8)');
      gradDomo.addColorStop(0.4, 'rgba(100,150,200,0.7)');
      gradDomo.addColorStop(0.7, 'rgba(30,60,100,0.8)');
      gradDomo.addColorStop(1, 'rgba(10,20,40,0.95)');

      ctx.fillStyle = gradDomo;
      ctx.beginPath();
      ctx.ellipse(ptzX, ptzY + ptzH * 0.25, ptzW / 2, ptzH * 0.55, 0, Math.PI, 0);
      ctx.fill();

      // visor / sunshield
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.beginPath();
      ctx.ellipse(ptzX, ptzY + 2, ptzW / 2 + 2, 4, 0, 0, Math.PI);
      ctx.fill();

      // reflexo do domo
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.beginPath();
      ctx.ellipse(ptzX - ptzW * 0.2, ptzY + ptzH * 0.2, ptzW * 0.2, ptzH * 0.25, -0.3, 0, Math.PI * 2);
      ctx.fill();

      // LED vermelho na base da PTZ
      ctx.shadowColor = '#ef4444';
      ctx.shadowBlur = 4;
      ctx.fillStyle = '#ef4444';
      ctx.beginPath();
      ctx.arc(ptzX + ptzW / 2 - 4, ptzY - 1, 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    map.on('load', async () => {
      try {
        // ── 1. Cria ícone 2D com aspecto 3D ──
        const canvas = document.createElement('canvas');
        const size = 128;
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');
        desenharPosteRealista(ctx, size, size);

        const img = new Image();
        await new Promise((resolve, reject) => {
          img.onload = resolve;
          img.onerror = reject;
          canvas.toBlob(blob => { img.src = URL.createObjectURL(blob); });
        });
        map.addImage('camera-icon', img, { pixelRatio: 2 });

        // ── 2. Carrega os pontos ──
        const resp = await fetch('/pontos_planejados.json');
        const data = await resp.json();
        const pontos = Array.isArray(data.pontos) ? data.pontos : [];

        const features = pontos.map(p => ({
          type: 'Feature',
          geometry: { type: 'Point', coordinates: [p.lng, p.lat] },
          properties: {
            id: p.id,
            nome: p.nome || ('Ponto ' + p.id),
            cidade: p.cidade || ''
          }
        }));

        map.addSource('cameras', {
          type: 'geojson',
          data: { type: 'FeatureCollection', features },
          cluster: false,
          maxzoom: 22
        });

        // ── 3. Círculos (zoom baixo) ──
        map.addLayer({
          id: 'cameras-circle',
          type: 'circle',
          source: 'cameras',
          minzoom: 10,
          maxzoom: 13.9,
          paint: {
            'circle-radius': ['interpolate', ['linear'], ['zoom'], 10, 2, 13, 6],
            'circle-color': '#38bdf8',
            'circle-opacity': ['interpolate', ['linear'], ['zoom'], 10, 0, 11, 0.6, 13, 1],
            'circle-stroke-width': 1,
            'circle-stroke-color': '#0284c7'
          }
        });

        // ── 4. Ícone 2D (zoom médio-alto) ──
        map.addLayer({
          id: 'cameras-icon',
          type: 'symbol',
          source: 'cameras',
          minzoom: 13,
          layout: {
            'icon-image': 'camera-icon',
            'icon-size': ['interpolate', ['linear'], ['zoom'],
              13, 0.15,
              14, 0.25,
              16, 0.5,
              18, 1.0,
              20, 2.0,
              22, 4.0
            ],
            'icon-anchor': 'bottom',
            'icon-allow-overlap': true,
            'icon-ignore-placement': true
          }
        });

        // ── 5. Labels ──
        map.addLayer({
          id: 'cameras-label',
          type: 'symbol',
          source: 'cameras',
          minzoom: 15,
          layout: {
            'text-field': ['get', 'nome'],
            'text-size': ['interpolate', ['linear'], ['zoom'], 15, 8, 18, 12, 22, 18],
            'text-offset': [0, -1.8],
            'text-font': ['DIN Pro Medium', 'Arial Unicode MS Bold'],
            'text-optional': true
          },
          paint: {
            'text-color': '#e2e8f0',
            'text-halo-color': 'rgba(0,0,0,0.8)',
            'text-halo-width': 2
          }
        });

        // ── 6. Popups ──
        map.on('click', 'cameras-icon', (e) => {
          const p = e.features[0].properties;
          new mapboxgl.Popup()
            .setLngLat(e.lngLat)
            .setHTML(`<b>${p.nome}</b><br>${p.cidade}<br><span style="font-size:11px;color:#94a3b8">${e.lngLat.lat.toFixed(5)}, ${e.lngLat.lng.toFixed(5)}</span>`)
            .addTo(map);
        });
        map.on('click', 'cameras-circle', (e) => {
          const p = e.features[0].properties;
          new mapboxgl.Popup()
            .setLngLat(e.lngLat)
            .setHTML(`<b>${p.nome}</b><br>${p.cidade}`)
            .addTo(map);
        });
        map.on('mouseenter', 'cameras-icon', () => map.getCanvas().style.cursor = 'pointer');
        map.on('mouseleave', 'cameras-icon', () => map.getCanvas().style.cursor = '');
        map.on('mouseenter', 'cameras-circle', () => map.getCanvas().style.cursor = 'pointer');
        map.on('mouseleave', 'cameras-circle', () => map.getCanvas().style.cursor = '');

        const pontosCount = features.length;
        document.getElementById('contador').textContent = pontosCount;
        document.getElementById('info').textContent = `✅ ${pontosCount} câmeras carregadas`;
      } catch (err) {
        document.getElementById('info').textContent = `❌ Erro: ${err.message}`;
        console.error('teste-camera-layer:', err);
      }
    });
  </script>
</body>
</html>
