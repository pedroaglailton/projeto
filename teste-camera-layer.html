<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Teste: Câmeras 3D</title>
  <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.24.0/mapbox-gl.css" rel="stylesheet">
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.24.0/mapbox-gl.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif; background: #0f172a; color: #e2e8f0; }
    #map { width: 100%; height: 100vh; }
    #info {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: #1e293be0; backdrop-filter: blur(6px);
      border: 1px solid #334155; border-radius: 10px;
      padding: 10px 18px; font-size: 13px; z-index: 999;
      text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,.5);
      pointer-events: none;
    }
    #legend {
      position: fixed; top: 16px; right: 60px; z-index: 999;
      background: #1e293be0; backdrop-filter: blur(6px);
      border: 1px solid #334155; border-radius: 8px;
      padding: 10px 14px; font-size: 12px; color: #94a3b8;
    }
    #legend span { display: flex; align-items: center; gap: 6px; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="legend">
    <span>📷 <b id="contador">0</b> câmeras</span>
    <span style="font-size:10px;color:#64748b">zoom 13+ ícone · 18+ 3D</span>
  </div>
  <div id="info">🔍 Dê zoom em Fortaleza para ver as câmeras</div>

  <script>
    mapboxgl.accessToken = 'pk.eyJ1IjoicGVkcm9hZ2xhaWx0b24iLCJhIjoiY21xMDQ2aDg3MDJrMjJ0cTBjd3dwYXJnOCJ9.4Ap4xEzCJ0US5mxDfmEf0g';

    const map = new mapboxgl.Map({
      container: 'map',
      zoom: 11,
      center: [-38.5267, -3.7319],
      pitch: 0,
      style: 'mapbox://styles/mapbox/standard'
    });
    map.addControl(new mapboxgl.NavigationControl(), 'top-right');

    // Ajusta pitch conforme zoom (fica 3D ao aproximar)
    map.on('zoomend', () => {
      const z = map.getZoom();
      const pitch = Math.max(0, Math.min(60, (z - 10) * 10));
      map.setPitch(pitch);
    });

    function desenharPosteRealista(ctx, w, h) {
      // ── Poste cônico FINO ──
      const baseL = w * 0.10;
      const topoL = w * 0.05;
      const posteY = h - h * 0.04;
      const posteTopo = h * 0.28;
      const posteH = posteY - posteTopo;

      const gradMetal = ctx.createLinearGradient(w * 0.3, 0, w * 0.7, 0);
      gradMetal.addColorStop(0, '#64748b');
      gradMetal.addColorStop(0.25, '#cbd5e1');
      gradMetal.addColorStop(0.5, '#f1f5f9');
      gradMetal.addColorStop(0.75, '#94a3b8');
      gradMetal.addColorStop(1, '#475569');

      ctx.fillStyle = gradMetal;
      ctx.beginPath();
      ctx.moveTo(w * 0.5 - baseL / 2, posteY);
      ctx.lineTo(w * 0.5 - topoL / 2, posteTopo);
      ctx.lineTo(w * 0.5 + topoL / 2, posteTopo);
      ctx.lineTo(w * 0.5 + baseL / 2, posteY);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#334155';
      ctx.lineWidth = 0.5;
      ctx.stroke();

      // ── Base flange ──
      ctx.fillStyle = '#475569';
      ctx.fillRect(w * 0.5 - baseL / 2 - 3, posteY - 3, baseL + 6, 5);
      ctx.fillStyle = '#334155';
      ctx.fillRect(w * 0.5 - baseL / 2 - 2, posteY, baseL + 4, 2);
      ctx.fillStyle = '#1e293b';
      [[w * 0.5 - baseL / 2 - 1, posteY], [w * 0.5 + baseL / 2 + 1, posteY]].forEach(([x, y]) => {
        ctx.beginPath(); ctx.arc(x, y, 1.5, 0, Math.PI * 2); ctx.fill();
      });

      // ── Caixa hermética 3D ──
      const cxY = posteY - posteH * 0.32;
      const cxW = baseL * 1.6;
      const cH = posteH * 0.10;
      const cxX = w * 0.5 - cxW / 2;

      // face frontal
      const gradFrente = ctx.createLinearGradient(cxX, 0, cxX + cxW, 0);
      gradFrente.addColorStop(0, '#334155');
      gradFrente.addColorStop(0.3, '#94a3b8');
      gradFrente.addColorStop(0.7, '#cbd5e1');
      gradFrente.addColorStop(1, '#475569');
      ctx.fillStyle = gradFrente;
      ctx.fillRect(cxX, cxY - cH / 2, cxW, cH);

      // face superior (3D perspective)
      ctx.fillStyle = '#64748b';
      ctx.beginPath();
      ctx.moveTo(cxX, cxY - cH / 2);
      ctx.lineTo(cxX + 4, cxY - cH / 2 - 5);
      ctx.lineTo(cxX + cxW + 4, cxY - cH / 2 - 5);
      ctx.lineTo(cxX + cxW, cxY - cH / 2);
      ctx.closePath();
      ctx.fill();

      // face lateral (3D perspective)
      ctx.fillStyle = '#1e293b';
      ctx.beginPath();
      ctx.moveTo(cxX + cxW, cxY - cH / 2);
      ctx.lineTo(cxX + cxW + 4, cxY - cH / 2 - 5);
      ctx.lineTo(cxX + cxW + 4, cxY + cH / 2 - 5);
      ctx.lineTo(cxX + cxW, cxY + cH / 2);
      ctx.closePath();
      ctx.fill();

      // borda da caixa
      ctx.strokeStyle = '#1e293b';
      ctx.lineWidth = 0.8;
      ctx.strokeRect(cxX, cxY - cH / 2, cxW, cH);

      // tampa (linha horizontal)
      ctx.strokeStyle = '#1e293b';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(cxX + 4, cxY);
      ctx.lineTo(cxX + cxW - 4, cxY);
      ctx.stroke();

      // fechos
      ctx.fillStyle = '#1e293b';
      [[cxX + 6, cxY], [cxX + cxW - 6, cxY]].forEach(([x, y]) => {
        ctx.beginPath(); ctx.arc(x, y, 1.5, 0, Math.PI * 2); ctx.fill();
      });

      // ── Braço para PTZ ──
      const bracoY = posteTopo;
      ctx.strokeStyle = '#64748b';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(w * 0.5, bracoY);
      ctx.lineTo(w * 0.5 + w * 0.24, bracoY - 3);
      ctx.stroke();

      // suporte vertical
      const supX = w * 0.5 + w * 0.24;
      ctx.strokeStyle = '#475569';
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(supX, bracoY - 3);
      ctx.lineTo(supX, bracoY + h * 0.025);
      ctx.stroke();

      // ── PTZ Hikvision ──
      const ptzBaseY = bracoY + h * 0.025;

      // 1. Sunshield/visor (curvo, estilo Hikvision)
      ctx.fillStyle = '#1a1a2e';
      ctx.beginPath();
      ctx.moveTo(supX - w * 0.10, ptzBaseY + 2);
      ctx.lineTo(supX + w * 0.16, ptzBaseY + 2);
      ctx.quadraticCurveTo(supX + w * 0.18, ptzBaseY - h * 0.015, supX + w * 0.14, ptzBaseY - h * 0.025);
      ctx.lineTo(supX - w * 0.08, ptzBaseY - h * 0.03);
      ctx.quadraticCurveTo(supX - w * 0.13, ptzBaseY - h * 0.01, supX - w * 0.10, ptzBaseY + 2);
      ctx.closePath();
      ctx.fill();

      // sombra do sunshield no corpo
      ctx.fillStyle = 'rgba(0,0,0,0.12)';
      ctx.fillRect(supX - w * 0.11, ptzBaseY + 2, w * 0.27, 4);

      // 2. Corpo principal (branco, formato Hikvision)
      const corpoW = w * 0.26;
      const corpoH = h * 0.07;
      const corpoX = supX - corpoW / 2;
      const corpoY = ptzBaseY + 2;

      const gradCorpo = ctx.createLinearGradient(corpoX, 0, corpoX + corpoW, 0);
      gradCorpo.addColorStop(0, '#cbd5e1');
      gradCorpo.addColorStop(0.25, '#f8fafc');
      gradCorpo.addColorStop(0.6, '#f1f5f9');
      gradCorpo.addColorStop(1, '#94a3b8');
      ctx.fillStyle = gradCorpo;
      ctx.fillRect(corpoX, corpoY, corpoW, corpoH);
      ctx.strokeStyle = '#6b7280';
      ctx.lineWidth = 0.5;
      ctx.strokeRect(corpoX, corpoY, corpoW, corpoH);

      // detalhe frontal (painel Hikvision)
      ctx.fillStyle = '#e2e8f0';
      ctx.fillRect(corpoX + corpoW * 0.08, corpoY + 2, corpoW * 0.18, corpoH - 4);
      ctx.strokeStyle = '#94a3b8';
      ctx.lineWidth = 0.3;
      ctx.strokeRect(corpoX + corpoW * 0.08, corpoY + 2, corpoW * 0.18, corpoH - 4);

      // fendas de ventilação
      ctx.strokeStyle = '#94a3b8';
      ctx.lineWidth = 0.4;
      for (let i = 0; i < 3; i++) {
        const vy = corpoY + corpoH * 0.3 + i * 3;
        ctx.beginPath();
        ctx.moveTo(corpoX + corpoW * 0.45, vy);
        ctx.lineTo(corpoX + corpoW * 0.6, vy);
        ctx.stroke();
      }

      // 3. Anel/base do domo (com IR LEDs)
      ctx.fillStyle = '#64748b';
      ctx.fillRect(corpoX - 2, corpoY + corpoH - 2, corpoW + 4, 4);
      ctx.fillStyle = '#475569';
      ctx.fillRect(corpoX - 1, corpoY + corpoH - 1, corpoW + 2, 2);

      // IR LEDs ao redor do anel
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      for (let i = 0; i < 5; i++) {
        const lx = corpoX + 3 + i * (corpoW - 6) / 4;
        ctx.beginPath();
        ctx.arc(lx, corpoY + corpoH, 1, 0, Math.PI * 2);
        ctx.fill();
      }

      // 4. Domo (cúpula semitransparente)
      const domoX = supX;
      const domoY = corpoY + corpoH + 2;
      const domoR = w * 0.11;

      // camada externa do domo (gradiente esférico)
      const gradDomo = ctx.createRadialGradient(
        domoX - domoR * 0.25, domoY - domoR * 0.15, domoR * 0.05,
        domoX, domoY + 3, domoR
      );
      gradDomo.addColorStop(0, 'rgba(255,255,255,0.2)');
      gradDomo.addColorStop(0.1, 'rgba(180,200,230,0.1)');
      gradDomo.addColorStop(0.4, 'rgba(30,50,80,0.5)');
      gradDomo.addColorStop(0.75, 'rgba(10,20,40,0.8)');
      gradDomo.addColorStop(1, 'rgba(3,7,15,0.95)');

      ctx.fillStyle = gradDomo;
      ctx.beginPath();
      ctx.ellipse(domoX, domoY, domoR, domoR * 0.7, 0, Math.PI, 0);
      ctx.fill();

      // borda do domo
      ctx.strokeStyle = 'rgba(100,120,140,0.3)';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.ellipse(domoX, domoY, domoR, domoR * 0.7, 0, Math.PI, 0);
      ctx.stroke();

      // reflexo principal
      ctx.fillStyle = 'rgba(255,255,255,0.1)';
      ctx.beginPath();
      ctx.ellipse(domoX - domoR * 0.25, domoY - domoR * 0.1, domoR * 0.2, domoR * 0.3, -0.3, 0, Math.PI * 2);
      ctx.fill();

      // reflexo secundário pequeno
      ctx.fillStyle = 'rgba(255,255,255,0.06)';
      ctx.beginPath();
      ctx.ellipse(domoX + domoR * 0.2, domoY + domoR * 0.05, domoR * 0.08, domoR * 0.12, 0.3, 0, Math.PI * 2);
      ctx.fill();

      // lente visível dentro do domo (círculo escuro)
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.beginPath();
      ctx.arc(domoX - 1, domoY + 2, domoR * 0.25, 0, Math.PI * 2);
      ctx.fill();

      // brilho da lente
      ctx.fillStyle = 'rgba(100,150,255,0.08)';
      ctx.beginPath();
      ctx.arc(domoX - 2, domoY + 1, domoR * 0.15, 0, Math.PI * 2);
      ctx.fill();
    }

    map.on('load', async () => {
      try {
        // ── 1. Cria ícone 2D com aspecto 3D ──
        const canvas = document.createElement('canvas');
        const size = 128;
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');
        desenharPosteRealista(ctx, size, size);

        const img = new Image();
        await new Promise((resolve, reject) => {
          img.onload = resolve;
          img.onerror = reject;
          canvas.toBlob(blob => { img.src = URL.createObjectURL(blob); });
        });
        map.addImage('camera-icon', img, { pixelRatio: 2 });

        // ── 2. Carrega os pontos ──
        const resp = await fetch('/pontos_planejados.json');
        const data = await resp.json();
        const pontos = Array.isArray(data.pontos) ? data.pontos : [];

        const features = pontos.map(p => ({
          type: 'Feature',
          geometry: { type: 'Point', coordinates: [p.lng, p.lat] },
          properties: {
            id: p.id,
            nome: p.nome || ('Ponto ' + p.id),
            cidade: p.cidade || ''
          }
        }));

        map.addSource('cameras', {
          type: 'geojson',
          data: { type: 'FeatureCollection', features },
          cluster: false,
          maxzoom: 22
        });

        // ── 3. Círculos (zoom baixo) ──
        map.addLayer({
          id: 'cameras-circle',
          type: 'circle',
          source: 'cameras',
          minzoom: 10,
          maxzoom: 13.9,
          paint: {
            'circle-radius': ['interpolate', ['linear'], ['zoom'], 10, 2, 13, 6],
            'circle-color': '#38bdf8',
            'circle-opacity': ['interpolate', ['linear'], ['zoom'], 10, 0, 11, 0.6, 13, 1],
            'circle-stroke-width': 1,
            'circle-stroke-color': '#0284c7'
          }
        });

        // ── 4. Ícone 2D (zoom médio-alto) ──
        map.addLayer({
          id: 'cameras-icon',
          type: 'symbol',
          source: 'cameras',
          minzoom: 13,
          layout: {
            'icon-image': 'camera-icon',
            'icon-size': ['interpolate', ['linear'], ['zoom'],
              13, 0.15,
              14, 0.25,
              16, 0.5,
              18, 1.0,
              20, 2.0,
              22, 4.0
            ],
            'icon-anchor': 'bottom',
            'icon-allow-overlap': true,
            'icon-ignore-placement': true
          }
        });

        // ── 5. Labels ──
        map.addLayer({
          id: 'cameras-label',
          type: 'symbol',
          source: 'cameras',
          minzoom: 15,
          layout: {
            'text-field': ['get', 'nome'],
            'text-size': ['interpolate', ['linear'], ['zoom'], 15, 8, 18, 12, 22, 18],
            'text-offset': [0, -1.8],
            'text-font': ['DIN Pro Medium', 'Arial Unicode MS Bold'],
            'text-optional': true
          },
          paint: {
            'text-color': '#e2e8f0',
            'text-halo-color': 'rgba(0,0,0,0.8)',
            'text-halo-width': 2
          }
        });

        // ── 6. Popups ──
        map.on('click', 'cameras-icon', (e) => {
          const p = e.features[0].properties;
          new mapboxgl.Popup()
            .setLngLat(e.lngLat)
            .setHTML(`<b>${p.nome}</b><br>${p.cidade}<br><span style="font-size:11px;color:#94a3b8">${e.lngLat.lat.toFixed(5)}, ${e.lngLat.lng.toFixed(5)}</span>`)
            .addTo(map);
        });
        map.on('click', 'cameras-circle', (e) => {
          const p = e.features[0].properties;
          new mapboxgl.Popup()
            .setLngLat(e.lngLat)
            .setHTML(`<b>${p.nome}</b><br>${p.cidade}`)
            .addTo(map);
        });
        map.on('mouseenter', 'cameras-icon', () => map.getCanvas().style.cursor = 'pointer');
        map.on('mouseleave', 'cameras-icon', () => map.getCanvas().style.cursor = '');
        map.on('mouseenter', 'cameras-circle', () => map.getCanvas().style.cursor = 'pointer');
        map.on('mouseleave', 'cameras-circle', () => map.getCanvas().style.cursor = '');

        const pontosCount = features.length;
        document.getElementById('contador').textContent = pontosCount;
        document.getElementById('info').textContent = `✅ ${pontosCount} câmeras carregadas`;
      } catch (err) {
        document.getElementById('info').textContent = `❌ Erro: ${err.message}`;
        console.error('teste-camera-layer:', err);
      }
    });
  </script>
</body>
</html>
