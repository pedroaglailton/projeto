<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Teste: Câmeras 3D - Fortaleza</title>
  <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.24.0/mapbox-gl.css" rel="stylesheet">
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.24.0/mapbox-gl.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif; background: #0f172a; color: #e2e8f0; }
    #map { width: 100%; height: 100vh; }
    #info {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: #1e293be0; backdrop-filter: blur(6px);
      border: 1px solid #334155; border-radius: 10px;
      padding: 10px 18px; font-size: 13px; z-index: 999;
      text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,.5);
      pointer-events: none;
      font-weight: 500;
    }
    #legend {
      position: fixed; top: 16px; right: 60px; z-index: 999;
      background: #1e293be0; backdrop-filter: blur(6px);
      border: 1px solid #334155; border-radius: 8px;
      padding: 10px 14px; font-size: 12px; color: #94a3b8;
      font-weight: 500;
    }
    #legend span { display: flex; align-items: center; gap: 6px; }
    .mapboxgl-popup-content {
      background: #1e293b;
      color: #e2e8f0;
      border: 1px solid #475569;
      border-radius: 8px;
      font-size: 12px;
    }
    .mapboxgl-popup-tip {
      border-top-color: #1e293b;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="legend">
    <span>📷 <b id="contador">0</b> câmeras</span>
    <span style="font-size:10px;color:#64748b">zoom 13+ ícone · 18+ 3D</span>
  </div>
  <div id="info">🔍 Dê zoom em Fortaleza para ver as câmeras</div>

  <script>
    mapboxgl.accessToken = 'pk.eyJ1IjoicGVkcm9hZ2xhaWx0b24iLCJhIjoiY21xMDQ2aDg3MDJrMjJ0cTBjd3dwYXJnOCJ9.4Ap4xEzCJ0US5mxDfmEf0g';

    const map = new mapboxgl.Map({
      container: 'map',
      zoom: 11,
      center: [-38.5267, -3.7319],
      pitch: 0,
      style: 'mapbox://styles/mapbox/standard'
    });
    map.addControl(new mapboxgl.NavigationControl(), 'top-right');

    // Ajusta pitch conforme zoom (fica 3D ao aproximar)
    map.on('zoomend', () => {
      const z = map.getZoom();
      const pitch = Math.max(0, Math.min(60, (z - 10) * 10));
      map.setPitch(pitch);
    });

    // Função redesenhada: Poste de concreto/cimento estilo urbano com braço metálico e câmera bullet
    function desenharPosteRealista(ctx, w, h) {
      ctx.clearRect(0, 0, w, h);
      
      // ============================================
      // 1. POSTE DE CONCRETO (cinza texturizado)
      // ============================================
      const baseW = w * 0.09;      // base larga
      const topoW = w * 0.045;     // topo mais fino
      const posteBaseY = h - h * 0.05;
      const posteTopoY = h * 0.22;
      
      // Gradiente de concreto
      const gradConcreto = ctx.createLinearGradient(w * 0.3, 0, w * 0.7, 0);
      gradConcreto.addColorStop(0, '#9ca3af');
      gradConcreto.addColorStop(0.25, '#b9c3d0');
      gradConcreto.addColorStop(0.5, '#cbd5e1');
      gradConcreto.addColorStop(0.75, '#b9c3d0');
      gradConcreto.addColorStop(1, '#9ca3af');
      ctx.fillStyle = gradConcreto;
      
      // Desenha poste cônico
      ctx.beginPath();
      ctx.moveTo(w * 0.5 - baseW / 2, posteBaseY);
      ctx.lineTo(w * 0.5 - topoW / 2, posteTopoY);
      ctx.lineTo(w * 0.5 + topoW / 2, posteTopoY);
      ctx.lineTo(w * 0.5 + baseW / 2, posteBaseY);
      ctx.closePath();
      ctx.fill();
      
      // Textura de concreto (pontos simulando porosidade)
      ctx.fillStyle = '#7e8a98';
      for (let i = 0; i < 60; i++) {
        const randX = w * 0.5 + (Math.random() - 0.5) * baseW;
        const randY = posteTopoY + Math.random() * (posteBaseY - posteTopoY);
        ctx.beginPath();
        ctx.arc(randX, randY, Math.random() * 1.5 + 0.5, 0, Math.PI * 2);
        ctx.fill();
      }
      
      // Anéis de concreto (marcas de forma)
      ctx.strokeStyle = '#6b7280';
      ctx.lineWidth = 1.2;
      const numAneis = 5;
      for (let i = 1; i <= numAneis; i++) {
        const yPos = posteTopoY + (posteBaseY - posteTopoY) * (i / (numAneis + 1));
        const widthAtY = baseW - ((baseW - topoW) * ((yPos - posteTopoY) / (posteBaseY - posteTopoY)));
        ctx.beginPath();
        ctx.moveTo(w * 0.5 - widthAtY / 2, yPos);
        ctx.lineTo(w * 0.5 + widthAtY / 2, yPos);
        ctx.stroke();
      }
      
      // Base de concreto reforçada
      ctx.fillStyle = '#7e8a98';
      ctx.fillRect(w * 0.5 - baseW / 2 - 4, posteBaseY - 4, baseW + 8, 8);
      ctx.fillStyle = '#6b7280';
      ctx.fillRect(w * 0.5 - baseW / 2 - 2, posteBaseY - 2, baseW + 4, 4);
      
      // Parafusos de ancoragem
      ctx.fillStyle = '#4b5563';
      for (let i = -1; i <= 1; i++) {
        ctx.beginPath();
        ctx.arc(w * 0.5 + i * (baseW / 3.5), posteBaseY + 1, 1.5, 0, Math.PI * 2);
        ctx.fill();
      }
      
      // ============================================
      // 2. BRAÇO METÁLICO CURVO (tipo "pescoço de ganso")
      // ============================================
      const bracoInicioX = w * 0.5;
      const bracoInicioY = posteTopoY + 6;
      
      // Sombra do braço
      ctx.shadowColor = 'rgba(0,0,0,0.3)';
      ctx.shadowBlur = 3;
      
      ctx.beginPath();
      ctx.moveTo(bracoInicioX, bracoInicioY);
      ctx.quadraticCurveTo(bracoInicioX + w * 0.08, bracoInicioY - 5, bracoInicioX + w * 0.2, bracoInicioY);
      ctx.lineTo(bracoInicioX + w * 0.21, bracoInicioY + 6);
      ctx.quadraticCurveTo(bracoInicioX + w * 0.08, bracoInicioY + 2, bracoInicioX, bracoInicioY + 6);
      ctx.closePath();
      
      const gradBraco = ctx.createLinearGradient(bracoInicioX, bracoInicioY, bracoInicioX + w * 0.2, bracoInicioY);
      gradBraco.addColorStop(0, '#9ca3af');
      gradBraco.addColorStop(0.5, '#e5e7eb');
      gradBraco.addColorStop(1, '#9ca3af');
      ctx.fillStyle = gradBraco;
      ctx.fill();
      ctx.strokeStyle = '#6b7280';
      ctx.lineWidth = 1;
      ctx.stroke();
      
      ctx.shadowBlur = 0;
      
      // Reforço / suporte triangular
      ctx.beginPath();
      ctx.moveTo(bracoInicioX + 3, bracoInicioY + 3);
      ctx.lineTo(bracoInicioX + w * 0.1, bracoInicioY + 1);
      ctx.lineTo(bracoInicioX + w * 0.08, bracoInicioY + 5);
      ctx.fillStyle = '#7e8a98';
      ctx.fill();
      
      // ============================================
      // 3. CAIXA DE JUNÇÃO (passagem de cabos)
      // ============================================
      const cxW = baseW * 1.3;
      const cH = (posteBaseY - posteTopoY) * 0.06;
      const cxX = w * 0.5 - cxW / 2;
      const cxY = posteBaseY - (posteBaseY - posteTopoY) * 0.25;
      
      ctx.fillStyle = '#475569';
      ctx.fillRect(cxX, cxY - cH / 2, cxW, cH);
      ctx.fillStyle = '#64748b';
      ctx.fillRect(cxX + 2, cxY - cH / 2 - 1, cxW - 4, 3);
      
      // Tampa da caixa
      ctx.fillStyle = '#334155';
      ctx.beginPath();
      ctx.moveTo(cxX, cxY - cH / 2);
      ctx.lineTo(cxX + 3, cxY - cH / 2 - 4);
      ctx.lineTo(cxX + cxW - 3, cxY - cH / 2 - 4);
      ctx.lineTo(cxX + cxW, cxY - cH / 2);
      ctx.fill();
      
      // Conector aparente
      ctx.fillStyle = '#1e293b';
      ctx.fillRect(cxX + cxW - 10, cxY - 3, 5, 6);
      ctx.fillStyle = '#f59e0b';
      ctx.fillRect(cxX + 5, cxY - 2, 2, 3);
      
      // ============================================
      // 4. SUPORTE DA CÂMERA (articulado)
      // ============================================
      const supX = bracoInicioX + w * 0.2;
      const supY = bracoInicioY;
      
      ctx.fillStyle = '#6b7280';
      ctx.fillRect(supX - 2, supY - 3, 6, 10);
      ctx.fillStyle = '#4b5563';
      ctx.fillRect(supX - 1, supY - 5, 4, 4);
      
      // Parafuso de articulação
      ctx.beginPath();
      ctx.arc(supX + 1, supY - 1, 2, 0, Math.PI * 2);
      ctx.fillStyle = '#374151';
      ctx.fill();
      
      // ============================================
      // 5. CÂMERA TIPO BULLET (cilíndrica)
      // ============================================
      const camX = supX + 6;
      const camY = supY - 2;
      const camComprimento = w * 0.16;
      const camDiametro = w * 0.045;
      
      // Corpo principal da câmera
      const gradCam = ctx.createLinearGradient(camX, camY - camDiametro/2, camX + camComprimento, camY);
      gradCam.addColorStop(0, '#e2e8f0');
      gradCam.addColorStop(0.3, '#ffffff');
      gradCam.addColorStop(0.7, '#cbd5e1');
      gradCam.addColorStop(1, '#94a3b8');
      ctx.fillStyle = gradCam;
      ctx.fillRect(camX, camY - camDiametro/2, camComprimento, camDiametro);
      
      // Anéis de acabamento
      ctx.fillStyle = '#475569';
      ctx.fillRect(camX + 2, camY - camDiametro/2 - 1, 3, camDiametro + 2);
      ctx.fillRect(camX + camComprimento - 8, camY - camDiametro/2 - 1, 4, camDiametro + 2);
      
      // Lente frontal (grande, escura)
      ctx.fillStyle = '#0f172a';
      ctx.beginPath();
      ctx.ellipse(camX + camComprimento - 3, camY, 4, camDiametro/1.5, 0, 0, Math.PI * 2);
      ctx.fill();
      
      // Reflexo da lente
      ctx.fillStyle = 'rgba(59,130,246,0.4)';
      ctx.beginPath();
      ctx.ellipse(camX + camComprimento - 4, camY - 1, 1.5, 2, 0, 0, Math.PI * 2);
      ctx.fill();
      
      // Detalhe IR (infravermelho)
      ctx.fillStyle = '#7f1d1d';
      ctx.fillRect(camX + camComprimento - 12, camY - 2, 4, 4);
      ctx.fillStyle = '#dc2626';
      ctx.fillRect(camX + camComprimento - 11, camY - 1, 2, 2);
      
      // Suporte de fixação da câmera
      ctx.fillStyle = '#4b5563';
      ctx.fillRect(camX + 5, camY - camDiametro/2 - 2, camComprimento - 18, 3);
      
      // ============================================
      // 6. CABO / FIAÇÃO APARENTE
      // ============================================
      ctx.beginPath();
      ctx.moveTo(cxX + cxW - 8, cxY);
      ctx.quadraticCurveTo(cxX + cxW, cxY - 5, supX - 3, supY + 2);
      ctx.lineTo(supX - 5, supY + 4);
      ctx.strokeStyle = '#374151';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      
      // ============================================
      // 7. DETALHES FINAIS (sombras e realces)
      // ============================================
      // Sombra projetada no chão
      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      ctx.beginPath();
      ctx.ellipse(w * 0.5, h - h * 0.03, baseW * 1.2, baseW * 0.5, 0, 0, Math.PI * 2);
      ctx.fill();
      
      // Realce lateral no poste
      ctx.globalCompositeOperation = 'lighter';
      ctx.fillStyle = 'rgba(255,255,255,0.08)';
      ctx.fillRect(w * 0.5 - topoW/3, posteTopoY, topoW/2, posteBaseY - posteTopoY);
      ctx.globalCompositeOperation = 'source-over';
    }

    map.on('load', async () => {
      try {
        // ── 1. Cria ícone com poste redesenhado ──
        const canvas = document.createElement('canvas');
        const size = 128;
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');
        desenharPosteRealista(ctx, size, size);

        const img = new Image();
        await new Promise((resolve, reject) => {
          img.onload = resolve;
          img.onerror = reject;
          canvas.toBlob(blob => { img.src = URL.createObjectURL(blob); });
        });
        map.addImage('camera-icon', img, { pixelRatio: 2 });

        // ── 2. Carrega os pontos do arquivo JSON ──
        const resp = await fetch('/pontos_planejados.json');
        const data = await resp.json();
        const pontos = Array.isArray(data.pontos) ? data.pontos : [];

        const features = pontos.map(p => ({
          type: 'Feature',
          geometry: { type: 'Point', coordinates: [p.lng, p.lat] },
          properties: {
            id: p.id,
            nome: p.nome || ('Ponto ' + p.id),
            cidade: p.cidade || 'Fortaleza',
            endereco: p.endereco || ''
          }
        }));

        map.addSource('cameras', {
          type: 'geojson',
          data: { type: 'FeatureCollection', features },
          cluster: false,
          maxzoom: 22
        });

        // ── 3. Círculos (zoom baixo) ──
        map.addLayer({
          id: 'cameras-circle',
          type: 'circle',
          source: 'cameras',
          minzoom: 10,
          maxzoom: 13.9,
          paint: {
            'circle-radius': ['interpolate', ['linear'], ['zoom'], 10, 2.5, 13, 7],
            'circle-color': '#3b82f6',
            'circle-opacity': ['interpolate', ['linear'], ['zoom'], 10, 0, 11, 0.7, 13, 1],
            'circle-stroke-width': 1.5,
            'circle-stroke-color': '#1e3a8a'
          }
        });

        // ── 4. Ícone do poste 3D (zoom médio-alto) ──
        map.addLayer({
          id: 'cameras-icon',
          type: 'symbol',
          source: 'cameras',
          minzoom: 13,
          layout: {
            'icon-image': 'camera-icon',
            'icon-size': ['interpolate', ['linear'], ['zoom'],
              13, 0.12,
              14, 0.2,
              16, 0.4,
              18, 0.8,
              20, 1.6,
              22, 3.2
            ],
            'icon-anchor': 'bottom',
            'icon-allow-overlap': true,
            'icon-ignore-placement': true
          }
        });

        // ── 5. Labels com nome das câmeras ──
        map.addLayer({
          id: 'cameras-label',
          type: 'symbol',
          source: 'cameras',
          minzoom: 15,
          layout: {
            'text-field': ['get', 'nome'],
            'text-size': ['interpolate', ['linear'], ['zoom'], 15, 9, 18, 13, 22, 20],
            'text-offset': [0, -1.6],
            'text-font': ['DIN Pro Medium', 'Arial Unicode MS Bold'],
            'text-optional': true
          },
          paint: {
            'text-color': '#f1f5f9',
            'text-halo-color': 'rgba(0,0,0,0.85)',
            'text-halo-width': 2.5,
            'text-halo-blur': 1
          }
        });

        // ── 6. Popups interativos com informações detalhadas ──
        map.on('click', 'cameras-icon', (e) => {
          const p = e.features[0].properties;
          new mapboxgl.Popup()
            .setLngLat(e.lngLat)
            .setHTML(`
              <div style="font-family: monospace; font-size: 12px;">
                <strong style="color: #60a5fa;">📹 ${p.nome}</strong><br>
                📍 ${p.cidade}<br>
                ${p.endereco ? `🏠 ${p.endereco}<br>` : ''}
                <span style="color: #94a3b8; font-size: 10px;">${e.lngLat.lat.toFixed(5)}°, ${e.lngLat.lng.toFixed(5)}°</span>
              </div>
            `)
            .addTo(map);
        });
        
        map.on('click', 'cameras-circle', (e) => {
          const p = e.features[0].properties;
          new mapboxgl.Popup()
            .setLngLat(e.lngLat)
            .setHTML(`<strong>${p.nome}</strong><br>${p.cidade}`)
            .addTo(map);
        });
        
        map.on('mouseenter', 'cameras-icon', () => map.getCanvas().style.cursor = 'pointer');
        map.on('mouseleave', 'cameras-icon', () => map.getCanvas().style.cursor = '');
        map.on('mouseenter', 'cameras-circle', () => map.getCanvas().style.cursor = 'pointer');
        map.on('mouseleave', 'cameras-circle', () => map.getCanvas().style.cursor = '');

        const pontosCount = features.length;
        document.getElementById('contador').textContent = pontosCount;
        document.getElementById('info').innerHTML = `✅ ${pontosCount} câmeras carregadas | Poste de concreto + câmera bullet`;
        
        // Pequena animação de carregamento
        setTimeout(() => {
          document.getElementById('info').style.opacity = '0.8';
        }, 3000);
        
      } catch (err) {
        document.getElementById('info').innerHTML = `❌ Erro: ${err.message}`;
        console.error('teste-camera-layer:', err);
      }
    });
  </script>
</body>
</html>
