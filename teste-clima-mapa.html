<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Teste: Clima dinâmico no mapa</title>
  <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.24.0/mapbox-gl.css" rel="stylesheet">
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.24.0/mapbox-gl.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif; background: #0f172a; color: #e2e8f0; }
    #map { width: 100%; height: 100vh; }
    #info {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #1e293be0; backdrop-filter: blur(6px);
      border: 1px solid #334155; border-radius: 12px;
      padding: 14px 24px; font-size: 14px; z-index: 999;
      text-align: center; min-width: 260px;
      box-shadow: 0 4px 20px rgba(0,0,0,.5);
    }
    #info .cidade { font-weight: 700; font-size: 16px; color: #7dd3fc; }
    #info .clima { margin-top: 4px; color: #94a3b8; }
    #info .clima .rain-active { color: #38bdf8; font-weight: 700; }
    #loading { position: fixed; top: 16px; right: 16px; background: #1e293b; padding: 6px 12px; border-radius: 6px; font-size: 12px; color: #94a3b8; z-index: 999; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="loading">⏳ carregando mapa…</div>
  <div id="info">
    <div class="cidade" id="cidade">—</div>
    <div class="clima" id="clima">Arraste o mapa para testar o clima</div>
  </div>

  <script>
    const GEO_USERNAME = 'pedroaglailton';

    mapboxgl.accessToken = 'pk.eyJ1IjoicGVkcm9hZ2xhaWx0b24iLCJhIjoiY21xMDQ2aDg3MDJrMjJ0cTBjd3dwYXJnOCJ9.4Ap4xEzCJ0US5mxDfmEf0g';

    const map = new mapboxgl.Map({
      container: 'map',
      zoom: 5,
      center: [-43.2, -12.9],
      pitch: 0,
      style: 'mapbox://styles/mapbox/standard'
    });

    map.addControl(new mapboxgl.NavigationControl(), 'top-right');

    let rainActive = false;
    let weatherCache = {};
    let buscaTimeout = null;

    map.on('load', () => {
      document.getElementById('loading').textContent = '✅ mapa pronto';
    });

    async function buscarClima(lat, lng) {
      const key = `${lat.toFixed(2)},${lng.toFixed(2)}`;
      if (weatherCache[key]) return weatherCache[key];

      const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=temperature_2m,precipitation,weather_code&timezone=auto&forecast_days=1`;
      const resp = await fetch(url);
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const data = await resp.json();
      const cur = data.current || {};
      const result = {
        temp: cur.temperature_2m ?? '--',
        precip: cur.precipitation ?? 0,
        weatherCode: cur.weather_code ?? 0
      };
      weatherCache[key] = result;
      return result;
    }

    function interpretarPrecipitacao(precip) {
      if (precip <= 0.2) return { nivel: 0, label: 'Sem chuva', icon: '☀️' };
      if (precip <= 2)  return { nivel: 0.3, label: 'Garoa leve', icon: '💧' };
      if (precip <= 8)  return { nivel: 0.6, label: 'Chuva moderada', icon: '🌦️' };
      return { nivel: 0.9, label: 'Chuva forte', icon: '⛈️' };
    }

    function aplicarChuva(intensidade) {
      if (!map.getStyle()) return;
      try {
        if (intensidade <= 0) {
          try { map.setRain(null); } catch(_) {}
          map.setConfigProperty('basemap', 'lightPreset', 'day');
          rainActive = false;
        } else {
          map.setRain({
            density: intensidade * 0.8,
            intensity: 0.8 + intensidade * 0.4,
            color: '#a8adbc',
            opacity: 0.4 + intensidade * 0.3,
            vignette: intensidade,
            'vignette-color': '#464646',
            direction: [0, 75],
            'droplet-size': [2.5, 18.0],
            'distortion-strength': 0.6,
            'center-thinning': 0
          });
          map.setConfigProperty('basemap', 'lightPreset', intensidade > 0.5 ? 'dawn' : 'dusk');
          rainActive = true;
        }
      } catch(e) { console.warn('[chuva] erro:', e); }
    }

    async function aoMoverMapa() {
      const center = map.getCenter();
      const lat = center.lat;
      const lng = center.lng;

      document.getElementById('loading').textContent = '🔍 buscando clima…';

      try {
        const [clima] = await Promise.all([
          buscarClima(lat, lng)
        ]);

        const chuva = interpretarPrecipitacao(clima.precip);
        const cidadeStr = `${lat.toFixed(2)}° ${lng.toFixed(2)}°`;

        document.getElementById('cidade').textContent = cidadeStr;
        document.getElementById('clima').innerHTML = `
          ${chuva.icon} ${chuva.label} &mdash; ${Math.round(clima.temp)}°C
          ${chuva.nivel > 0 ? ' <span class="rain-active">🌧 ATIVO</span>' : ''}
        `;

        aplicarChuva(chuva.nivel);
        document.getElementById('loading').textContent = `✅ ${chuva.label}`;
      } catch(e) {
        document.getElementById('loading').textContent = '❌ erro ao buscar clima';
        console.warn('[clima] falha:', e);
      }
    }

    map.on('moveend', () => {
      if (buscaTimeout) clearTimeout(buscaTimeout);
      buscaTimeout = setTimeout(aoMoverMapa, 800);
    });

    aoMoverMapa();
  </script>
</body>
</html>
