<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Teste: Poste de Câmera</title>
  <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.24.0/mapbox-gl.css" rel="stylesheet">
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.24.0/mapbox-gl.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif; background: #0f172a; color: #e2e8f0; }
    #map { width: 100%; height: 100vh; }
    #info {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #1e293be0; backdrop-filter: blur(6px);
      border: 1px solid #334155; border-radius: 12px;
      padding: 14px 24px; font-size: 14px; z-index: 999;
      text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,.5);
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="info">📍 Postes de câmera — zoom para ver</div>

  <script>
    mapboxgl.accessToken = 'pk.eyJ1IjoicGVkcm9hZ2xhaWx0b24iLCJhIjoiY21xMDQ2aDg3MDJrMjJ0cTBjd3dwYXJnOCJ9.4Ap4xEzCJ0US5mxDfmEf0g';

    const map = new mapboxgl.Map({
      container: 'map',
      zoom: 12,
      center: [-38.5267, -3.7319],
      pitch: 45,
      style: 'mapbox://styles/mapbox/standard'
    });
    map.addControl(new mapboxgl.NavigationControl(), 'top-right');

    // ── Cria o elemento HTML do poste de câmera ──
    function criarPosteCamera(nome, visitado = false) {
      const cor = visitado ? '#22c55e' : '#38bdf8';
      const corBase = visitado ? '#15803d' : '#1e40af';
      const el = document.createElement('div');
      el.innerHTML = `
        <div style="
          position:relative; width:32px; height:56px;
          display:flex; flex-direction:column; align-items:center;
          filter:drop-shadow(0 2px 6px rgba(0,0,0,0.5));
        ">
          <!-- poste -->
          <div style="
            position:absolute; bottom:0; width:4px; height:32px;
            background:linear-gradient(to top, #64748b, #94a3b8);
            border-radius:2px;
          "></div>
          <!-- base do poste -->
          <div style="
            position:absolute; bottom:-2px; width:14px; height:4px;
            background:#475569; border-radius:2px;
          "></div>
          <!-- suporte da camera -->
          <div style="
            position:absolute; bottom:28px; width:12px; height:3px;
            background:#64748b; border-radius:1px;
          "></div>
          <!-- corpo da camera -->
          <div style="
            position:absolute; bottom:30px; width:16px; height:14px;
            background:radial-gradient(circle at 40% 35%, #5eead4, ${cor});
            border:2px solid ${corBase};
            border-radius:4px 4px 2px 2px;
            box-shadow:inset 0 -2px 4px rgba(0,0,0,0.3);
          "></div>
          <!-- lente -->
          <div style="
            position:absolute; bottom:34px; width:6px; height:6px;
            background:radial-gradient(circle, #fff 20%, #0ea5e9 60%, #1e3a5f);
            border-radius:50%; border:1px solid ${corBase};
            box-shadow:0 0 4px rgba(56,189,248,0.5);
          "></div>
        </div>`;
      return el;
    }

    // ── Carrega pontos do arquivo JSON ──
    let markers = [];

    map.on('load', async () => {
      try {
        const resp = await fetch('/pontos_planejados.json');
        const data = await resp.json();
        const pontos = Array.isArray(data.pontos) ? data.pontos : [];

        // Mostra apenas os primeiros 100 para nao travar
        const amostra = pontos.slice(0, 100);

        for (const p of amostra) {
          const el = criarPosteCamera(p.nome || ('Ponto ' + p.id));
          const mk = new mapboxgl.Marker({ element: el, anchor: 'bottom' })
            .setLngLat([p.lng, p.lat])
            .addTo(map);
          markers.push(mk);

          // Popup ao clicar
          el.style.cursor = 'pointer';
          el.addEventListener('click', () => {
            new mapboxgl.Popup({ offset: 50 })
              .setLngLat([p.lng, p.lat])
              .setHTML(`
                <b>${p.nome || 'Ponto ' + p.id}</b><br>
                ${p.cidade || '—'}<br>
                <span style="font-size:11px;color:#94a3b8">${p.lat.toFixed(6)}, ${p.lng.toFixed(6)}</span>
              `)
              .addTo(map);
          });
        }
        document.getElementById('info').textContent =
          `📷 ${amostra.length} postes de câmera (de ${pontos.length} totais)`;
      } catch(e) {
        document.getElementById('info').textContent = '❌ erro ao carregar pontos';
        console.error(e);
      }
    });
  </script>
</body>
</html>
