<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Teste: Poste de Câmera</title>
  <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.24.0/mapbox-gl.css" rel="stylesheet">
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.24.0/mapbox-gl.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif; background: #0f172a; color: #e2e8f0; }
    #map { width: 100%; height: 100vh; }
    #info {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #1e293be0; backdrop-filter: blur(6px);
      border: 1px solid #334155; border-radius: 12px;
      padding: 14px 24px; font-size: 14px; z-index: 999;
      text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,.5);
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="info">📍 Postes de câmera — zoom para ver</div>

  <script>
    mapboxgl.accessToken = 'pk.eyJ1IjoicGVkcm9hZ2xhaWx0b24iLCJhIjoiY21xMDQ2aDg3MDJrMjJ0cTBjd3dwYXJnOCJ9.4Ap4xEzCJ0US5mxDfmEf0g';

    const map = new mapboxgl.Map({
      container: 'map',
      zoom: 16,
      center: [-38.5267, -3.7319],
      pitch: 45,
      style: 'mapbox://styles/mapbox/standard'
    });
    map.addControl(new mapboxgl.NavigationControl(), 'top-right');

    // Esconde os POIs/markers 3D azuis do Mapbox (depois do style carregar)
    map.on('style.load', () => {
      const style = map.getStyle();
      for (const layer of style.layers) {
        const id = (layer.id || '').toLowerCase();
        if (id.includes('poi') || id.includes('landmark') || id.includes('transit')) {
          try { map.setLayoutProperty(layer.id, 'visibility', 'none'); } catch {}
        }
      }
    });

    // ── Carrega pontos do arquivo JSON e renderiza via symbol layer ──
    // A symbol layer usa icon-size interpolado com exponential 2, que
    // dobra o tamanho a cada nivel de zoom — mesma taxa que os metros/pixel
    // dobra no mapa. Resultado: o poste mantém a proporção real de 15m.
    // (poste.png tem 188x760px; em Fortaleza z=18 -> ~100px = 15m)
    map.on('load', async () => {
      try {
        const resp = await fetch('pontos_planejados.json');
        const data = await resp.json();
        const pontos = Array.isArray(data.pontos) ? data.pontos : [];
        const amostra = pontos; // todas as 1603 cameras

        // Calcula bounds de TODAS as cameras para enquadrar o mapa
        let minLng = Infinity, maxLng = -Infinity, minLat = Infinity, maxLat = -Infinity;
        for (const p of amostra) {
          const lng = Number(p.lng), lat = Number(p.lat);
          if (!isFinite(lng) || !isFinite(lat)) continue;
          if (lng < minLng) minLng = lng;
          if (lng > maxLng) maxLng = lng;
          if (lat < minLat) minLat = lat;
          if (lat > maxLat) maxLat = lat;
        }
        if (isFinite(minLng) && isFinite(minLat)) {
          map.fitBounds([[minLng, minLat], [maxLng, maxLat]], {
            padding: 60, maxZoom: 11, duration: 0
          });
        }

        // Carrega a imagem do poste como icone (cache-busting: ?v=4)
        const image = await new Promise((resolve, reject) => {
          map.loadImage('poste.png?v=4', (err, img) => {
            if (err) return reject(err);
            console.log('[poste] imagem carregada:', img.width, 'x', img.height);
            resolve(img);
          });
        });
        if (!map.hasImage('poste-15m')) map.addImage('poste-15m', image);
        console.log('[poste] icone registrado, zoom inicial:', map.getZoom());

        // Source com os pontos
        map.addSource('postes', {
          type: 'geojson',
          data: {
            type: 'FeatureCollection',
            features: amostra.map(p => ({
              type: 'Feature',
              geometry: { type: 'Point', coordinates: [p.lng, p.lat] },
              properties: { nome: p.nome || ('Ponto ' + p.id), cidade: p.cidade || '' }
            }))
          }
        });

        // Layer symbol com tamanho proporcional a 15m reais
        // metros/pixel em lat -3.73: z=14 -> 2.38, z=18 -> 0.149
        // 15m / metrosPorPixel / 760 (altura da imagem) = icon-size exato
        // exponential 2 garante que o tamanho dobre junto com o zoom
        map.addLayer({
          id: 'postes-symbol',
          type: 'symbol',
          source: 'postes',
          layout: {
            'icon-image': 'poste-15m',
            'icon-anchor': 'bottom',
            'icon-allow-overlap': true,
            'icon-ignore-placement': true,
            'icon-size': [
              'interpolate', ['exponential', 2], ['zoom'],
              6, 0.008,
              10, 0.008,
              14, 0.0083,
              15, 0.0166,
              16, 0.033,
              17, 0.066,
              18, 0.133,
              19, 0.265,
              20, 0.530
            ]
          }
        });

        // Popup e cursor ao interagir
        map.on('click', 'postes-symbol', (e) => {
          const f = e.features[0];
          const p = f.properties;
          new mapboxgl.Popup({ offset: [0, -10], closeButton: true })
            .setLngLat(f.geometry.coordinates)
            .setHTML(`
              <b>${p.nome}</b><br>
              ${p.cidade || '—'}<br>
              <span style="font-size:11px;color:#94a3b8">
                ${f.geometry.coordinates[1].toFixed(6)}, ${f.geometry.coordinates[0].toFixed(6)}
              </span>
            `)
            .addTo(map);
        });
        map.on('mouseenter', 'postes-symbol', () => {
          map.getCanvas().style.cursor = 'pointer';
        });
        map.on('mouseleave', 'postes-symbol', () => {
          map.getCanvas().style.cursor = '';
        });

        document.getElementById('info').textContent =
          `📷 ${amostra.length} postes de câmera (de ${pontos.length} totais) — escala real 15m`;
      } catch(e) {
        document.getElementById('info').textContent = '❌ erro ao carregar pontos';
        console.error(e);
      }
    });
  </script>
</body>
</html>
